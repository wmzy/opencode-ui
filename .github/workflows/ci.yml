name: CI

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable && corepack prepare pnpm@11 --activate
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
